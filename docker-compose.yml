services:
  openbob-host:
    build:
      context: .
      dockerfile: Dockerfile
    image: openbob-host:latest
    container_name: openbob-host
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Spawn agent containers
      - ${DATA_PATH}:/data # DB + per-group data (ipc, opencode, telegram, project)
      - ./workspace:/workspace # AGENTS.md + base opencode.json template
      - ./skills:/skills:ro # Skills (read-only, mounted into agent containers)
    environment:
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Matrix
      - MATRIX_HOMESERVER_URL=${MATRIX_HOMESERVER_URL:-}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN:-}
      - MATRIX_BOT_USER_ID=${MATRIX_BOT_USER_ID:-}
      # Model — format: providerID/modelID
      - MODEL=${MODEL:-anthropic/claude-sonnet-4-6}
      # Auth: provider API keys are read from ${DATA_PATH}/opencode/auth.json
      # (mounted into agent containers automatically — no env vars needed)
      # Paths inside container
      - DATA_DIR=/data
      # Docker
      - DOCKER_NETWORK=openbob
      - AGENT_IMAGE=openbob-agent:latest
      # DATA_PATH passed through so agent spawner knows the absolute host path
      - DATA_PATH=${DATA_PATH}
      # Initial group registration (first run — leave empty to skip)
      - INITIAL_GROUP_JID=${INITIAL_GROUP_JID:-}
      - INITIAL_GROUP_FOLDER=${INITIAL_GROUP_FOLDER:-main}
      - INITIAL_GROUP_TRIGGER=${INITIAL_GROUP_TRIGGER:-openbob}
      - INITIAL_GROUP_IS_MAIN=${INITIAL_GROUP_IS_MAIN:-true}
      # OpenViking memory — only active when profile=memory
      - OPENVIKING_URL=${OPENVIKING_URL:-}
      - OPENVIKING_API_KEY=${OPENVIKING_API_KEY:-openbob-local}
      # Optional
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - openbob

  # Agent image — built by `docker compose build`, spawned on-demand by host via Docker socket
  # deploy.replicas=0 prevents it from starting as a container on `compose up`
  openbob-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: openbob-agent:latest
    deploy:
      replicas: 0
    networks:
      - openbob

  openviking:
    build:
      context: ./openviking
      dockerfile: Dockerfile
    image: openbob-openviking:latest
    container_name: openbob-openviking
    restart: unless-stopped
    ports:
      - '1933:1933' # API
      - '8020:8020' # Web console: http://localhost:8020
    volumes:
      - ${DATA_PATH}/openviking:/data
    environment:
      - OPENVIKING_LLM_KEY=${OPENVIKING_LLM_KEY}
      - OPENVIKING_LLM_MODEL=${OPENVIKING_LLM_MODEL:-openai/gpt-4o-mini}
      - OPENVIKING_EMBEDDING_MODEL=${OPENVIKING_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      - OPENVIKING_EMBEDDING_API_BASE=${OPENVIKING_EMBEDDING_API_BASE:-https://openrouter.ai/api/v1}
      - OPENVIKING_EMBEDDING_DIMENSION=${OPENVIKING_EMBEDDING_DIMENSION:-1536}
      - OPENVIKING_API_KEY=${OPENVIKING_API_KEY:-openbob-local}
      - OPENVIKING_CONSOLE=${OPENVIKING_CONSOLE:-1}
    networks:
      - openbob
    profiles:
      - memory

networks:
  openbob:
    name: openbob
