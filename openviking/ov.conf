[server]
port = 1933
data_dir = "/data"

[embedding]
# Phase 1: Keyword/Sparse — no embedding model, no API key needed
mode = "sparse"

# Phase 2 (uncomment when llama-embeddings container is ready):
# provider = "openai"
# api_base = "http://llama-embeddings:8080"
# model = "jina-embeddings-v2-base-en"
# mode = "dense"

[llm]
# VLM for session distillation (auto memory extraction after sessions)
# Points to yetaclaw-host credential proxy — same as agent
base_url = "http://yetaclaw-host:3001"
api_key = "placeholder"
# Set model via env: OPENVIKING_LLM_MODEL=anthropic/claude-haiku-4-5
